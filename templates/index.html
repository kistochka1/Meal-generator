<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор обеда - на Flask</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        #generateBtn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        #generateBtn:hover {
            transform: translateY(-2px);
        }

        #generateBtn:active {
            transform: translateY(0);
        }

        .result {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            padding: 40px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .meals-section {
            margin-top: 30px;
        }

        .meals-section h2 {
            margin-bottom: 15px;
            color: #555;
            font-size: 20px;
        }

        #mealsList {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        #mealsList li {
            padding: 12px;
            background: #f9f9f9;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        #mealsList li:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .add-meal {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        #newMealInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        #newMealInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-1px);
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍔 Что сегодня съесть?</h1>
        <div class="subtitle">Генератор случайных блюд на Flask</div>

        <button id="generateBtn">🎲 Выбрать блюдо</button>

        <div class="result" id="result">
            👈 Нажми на кнопку
        </div>

        <div class="meals-section">
            <h2>📝 Мои блюда</h2>
            <div id="status" class="status"></div>
            <ul id="mealsList">
                <li class="loading">Загрузка...</li>
            </ul>

            <div class="add-meal">
                <input type="text" id="newMealInput" placeholder="Например: Борщ, Пельмени, Омлет...">
                <button id="addBtn">➕ Добавить</button>
            </div>
        </div>
    </div>

    <script>
        let meals = [];

        // Показать статус
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = isError ? 'status error' : 'status success';
            setTimeout(() => {
                statusDiv.className = 'status';
            }, 3000);
        }

        // Загрузка списка с сервера
        async function loadMeals() {
            try {
                const response = await fetch('/api/get_meals');
                const data = await response.json();
                meals = data;
                renderMealsList();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showStatus('Ошибка загрузки списка блюд', true);
            }
        }

        // Отображение списка
        function renderMealsList() {
            const listElement = document.getElementById('mealsList');
            listElement.innerHTML = '';

            if (meals.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-message';
                emptyDiv.textContent = '✨ Добавьте свои блюда ✨';
                listElement.appendChild(emptyDiv);
                return;
            }

            meals.forEach((meal, index) => {
                const li = document.createElement('li');
                const span = document.createElement('span');
                span.textContent = meal;
                const button = document.createElement('button');
                button.textContent = '✖';
                button.className = 'delete-btn';
                button.onclick = () => deleteMeal(index);
                li.appendChild(span);
                li.appendChild(button);
                listElement.appendChild(li);
            });
        }

        // Генерация случайного блюда
        function generateRandomMeal() {
            const resultDiv = document.getElementById('result');

            if (meals.length === 0) {
                resultDiv.innerHTML = '😢 Добавьте хотя бы одно блюдо!';
                return;
            }

            const randomIndex = Math.floor(Math.random() * meals.length);
            const chosenMeal = meals[randomIndex];
            resultDiv.innerHTML = `🍽️ ${chosenMeal} 🎉`;

            // Анимация
            resultDiv.style.animation = 'none';
            setTimeout(() => {
                resultDiv.style.animation = 'fadeIn 0.5s';
            }, 10);
        }

        // Добавление нового блюда
        async function addNewMeal() {
            const input = document.getElementById('newMealInput');
            const newMeal = input.value.trim();

            if (newMeal === '') {
                showStatus('Введите название блюда', true);
                return;
            }

            try {
                const response = await fetch('/api/add_meal', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ meal: newMeal })
                });

                const data = await response.json();

                if (response.ok) {
                    meals = data.meals;
                    renderMealsList();
                    input.value = '';
                    showStatus(`✅ "${newMeal}" добавлено!`);
                } else {
                    showStatus(data.error || 'Ошибка добавления', true);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showStatus('Ошибка соединения с сервером', true);
            }
        }

        // Удаление блюда
        async function deleteMeal(index) {
            const deletedMeal = meals[index];

            try {
                const response = await fetch('/api/delete_meal', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ index: index })
                });

                const data = await response.json();

                if (response.ok) {
                    meals = data.meals;
                    renderMealsList();
                    showStatus(`🗑️ "${deletedMeal}" удалено`);
                } else {
                    showStatus(data.error || 'Ошибка удаления', true);
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showStatus('Ошибка соединения с сервером', true);
            }
        }

        // Инициализация
        loadMeals();

        // Навешиваем обработчики
        document.getElementById('generateBtn').onclick = generateRandomMeal;
        document.getElementById('addBtn').onclick = addNewMeal;

        // Добавление по Enter
        document.getElementById('newMealInput').onkeypress = function(e) {
            if (e.key === 'Enter') {
                addNewMeal();
            }
        };
    </script>
</body>
</html>
